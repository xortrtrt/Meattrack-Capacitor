<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#8a1f1f" />
    <title>MEATTRACK</title>
    <style>
      :root { font-family: Inter, system-ui, sans-serif; color: #321512; background: #fff8ec; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; min-height: 100dvh; display: grid; place-items: center; padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom)); }
      main { width: min(100%, 420px); padding: 32px 24px; border: 1px solid #ead7c2; border-radius: 24px; background: #fff; box-shadow: 0 18px 50px #51200f1a; text-align: center; }
      .mark { width: 72px; height: 72px; margin: 0 auto 20px; display: grid; place-items: center; border-radius: 20px; background: #8a1f1f; color: white; font-size: 32px; font-weight: 900; }
      h1 { margin: 0; letter-spacing: .08em; font-size: 28px; }
      p { margin: 14px 0 0; color: #6d5550; line-height: 1.55; }
      code { display: block; margin-top: 18px; padding: 12px; border-radius: 10px; background: #f8eee2; color: #711a1a; text-align: left; overflow-wrap: anywhere; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">M</div>
      <h1>MEATTRACK</h1>
      <p>The mobile shell is ready, but no server has been selected for this build.</p>
      <p>Set the deployed FastAPI URL, then sync the native project again:</p>
      <code>$env:MOBILE_APP_URL="https://your-domain"<br />npm run mobile:sync</code>
    </main>
  </body>
</html>

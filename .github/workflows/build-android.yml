name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      mobile_app_url:
        description: Public HTTPS URL of the deployed FastAPI service
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MOBILE_APP_URL: ${{ inputs.mobile_app_url }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Validate backend URL
        shell: bash
        run: |
          MOBILE_APP_URL="${MOBILE_APP_URL%/}"
          MOBILE_APP_URL="${MOBILE_APP_URL%/health}"
          if [[ ! "$MOBILE_APP_URL" =~ ^https://[^[:space:]]+$ ]]; then
            echo "mobile_app_url must be a public HTTPS URL" >&2
            exit 1
          fi
          echo "MOBILE_APP_URL=$MOBILE_APP_URL" >> "$GITHUB_ENV"

          health_url="$MOBILE_APP_URL/health"
          health_body="$(mktemp)"
          echo "Waiting for backend health check: $health_url"
          for attempt in {1..12}; do
            http_code="$(curl \
              --location \
              --silent \
              --show-error \
              --connect-timeout 15 \
              --max-time 60 \
              --output "$health_body" \
              --write-out "%{http_code}" \
              "$health_url" || true)"
            echo "Attempt $attempt/12 returned HTTP ${http_code:-000}"
            cat "$health_body"
            echo
            if [[ "$http_code" == "200" ]] \
              && grep -Eq '"status"[[:space:]]*:[[:space:]]*"ok"' "$health_body" \
              && grep -Eq '"database"[[:space:]]*:[[:space:]]*"connected"' "$health_body"; then
              echo "Backend and database are ready."
              exit 0
            fi
            sleep 10
          done
          echo "Backend health check did not become ready after 12 attempts." >&2
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install Android SDK 36
        shell: bash
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          sdkmanager="$sdk_root/cmdline-tools/latest/bin/sdkmanager"
          if [[ ! -x "$sdkmanager" ]]; then
            echo "sdkmanager was not found at $sdkmanager" >&2
            find "$sdk_root/cmdline-tools" -type f -name sdkmanager -print >&2 || true
            exit 1
          fi
          yes | "$sdkmanager" --licenses >/dev/null || true
          "$sdkmanager" --install "platforms;android-36" "build-tools;36.0.0"

      - name: Install Capacitor dependencies
        run: npm ci

      - name: Sync deployed URL into Android
        run: npm run mobile:sync

      - name: Build installable debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: meattrack-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
